resolve_inputs_task:
  description: >
    You are the first agent to run. Your job is to audit all user-provided inputs and resolve
    any that are missing, blank, "N/A", or too vague to act on — using live web research only.

    IMPORTANT: Today's date is {current_date}. Use this as the authoritative current date for
    all research, date calculations, and time_frame resolution. Never use dates from 2024 or
    any year other than what is implied by {current_date}.

    Inputs to audit:
    - location: {location}
    - origin: {origin}
    - method_of_travel: {method_of_travel}
    - group_size: {group_size}
    - budget: {budget}
    - time_frame: {time_frame}
    - activity_preferences: {activity_preferences}
    - extra_preferences: {extra_prefrences}

    For each input that is missing or N/A, search the web to find the best real-world option.
    Examples of how to resolve:
    - location is N/A:
        * If method_of_travel is "car" or "drive": ONLY suggest destinations reachable by car in 1–6 hours
          from {origin}. Search "best road trip destinations from {origin}" or "weekend getaways driving
          distance from {origin}". NEVER suggest a fly-to destination when the user is driving.
        * If method_of_travel is "boat", "cruise", or "ferry": search "cruises or ferries departing from {origin}".
        * Otherwise: search "best vacation destinations from {origin}" or "top travel destinations [current season] [year]",
          pick the top result that fits the group and any known preferences.
    - location is already provided but is nearby (same city, same state, or short drive from origin):
        * Recognize this as a short-distance trip. Do NOT replace or "upgrade" the destination to somewhere farther.
          Pass through the provided location unchanged and flag it as a short-distance trip in your output.
    - budget is N/A: search "average vacation cost to [resolved location] for [group_size]" and pick a realistic range.
    - method_of_travel is N/A: search "best way to travel from {origin} to [resolved location]". If the
      distance is under ~4 hours by car, default to "car" unless context suggests otherwise.
    - activity_preferences is N/A: search "top things to do in [resolved location]" and summarize the most popular categories.
    - time_frame is N/A: search "best time to visit [resolved location]" and pick an upcoming optimal travel window.
    - group_size is N/A: default to 2 adults but note it in the output.

    Inputs that are already provided and clear should be passed through unchanged.
    Every resolved value must include a brief justification citing what you found in your research.
  expected_output: >
    A structured markdown block titled "## Resolved Trip Parameters" listing every input field
    with its final value. Mark user-provided values as "(provided)" and autonomously resolved
    values as "(researched)" with a one-line justification.

    Example format:
    ## Resolved Trip Parameters
    - **location**: Japan (researched — ranked #1 destination from US in spring 2026 per [source])
    - **origin**: New York, USA (provided)
    - **method_of_travel**: Plane (researched — only practical option; ~14hr direct flights available)
    - **group_size**: Couple, 2 adults (provided)
    - **budget**: Mid-range, ~$4,000–$6,000 total (researched — avg cost for 7-day Japan trip per [source])
    - **time_frame**: April 20 – April 27, 2026 (researched — peak cherry blossom season per [source])
    - **activity_preferences**: temples, street food, anime culture (researched — top activities in Japan per [source])
    - **extra_preferences**: none specified (provided)
  agent: trip_input_resolver

travel_research_task:
  description: >
    Use the resolved parameters from resolve_inputs_task context as your source of truth for all
    field values. Do not use raw template variables if they conflict with the resolved values.
    Today's date is {current_date} — all flight dates, pricing, and availability must reflect
    this. Never use 2024 dates or prices.

    Research and compile the best available travel options from the resolved origin to the resolved
    location for the resolved travel dates and group size. Your approach depends entirely on the
    resolved method_of_travel:

    IF method_of_travel is PLANE:
      - Search for flights across all major carriers and platforms.
      - Regional price comparison: Run multiple Google Flights searches with different gl/currency combos.
      - Find flight prices directly on a carrier's website
        At minimum: origin country (e.g. gl='us'), destination country, and home country of major carrier on route
        (e.g. gl='mx' for Aeromexico, gl='br' for LATAM Brazil, gl='de' for Lufthansa, gl='nl' for KLM).
        Convert all results to USD and flag all options.
      - Include direct and connecting options. Factor in group size for seat availability.

    IF method_of_travel is CAR:
      - Research the best driving route between origin and destination.
      - Report total drive time and distance.
      - Estimate fuel cost based on current average gas prices (~$3.50/gal) and a typical vehicle (~25 MPG).
      - List recommended rest stops and any interesting roadside attractions en route.
      - Note any tolls, seasonal road closures, or scenic alternate routes.
      - Do NOT search for flights.

    IF method_of_travel is BOAT / CRUISE / FERRY:
      - Research available cruise lines, ferry operators, or charter services between the two points.
      - Look for schedules, cabin/seating options, pricing tiers, and what is included.
      - For ferries, compare fast vs. standard crossings and note vehicle transport options.
      - Do NOT search for flights.

    For any other method_of_travel, adapt your research to that mode.
  expected_output: >
    A detailed travel report formatted as markdown. Content depends on method_of_travel:

    FOR PLANE:
    - Top flight options with carrier, route, duration, price per person, and total for group
    - Regional price comparison table (all converted to USD) with the best-deal region highlighted
    - Booking platform tips and best times to book

    FOR CAR:
    - Recommended route with total distance and estimated drive time
    - Estimated fuel cost (total for group and per person) based on current gas prices
    - Rest stop recommendations and points of interest along the route
    - Any tolls, road notes, or scenic detour options

    FOR BOAT / CRUISE / FERRY:
    - Top operator options with schedule, cabin/seat tiers, pricing, and what's included
    - Vehicle transport options if applicable
    - Booking tips and best times to reserve
  agent: travel_researcher
  context:
    - resolve_inputs_task

budget_task:
  description: >
    Use the resolved parameters from resolve_inputs_task context as your source of truth.
    Create a comprehensive vacation budget for the resolved location over the resolved time_frame
    based on the resolved budget level and group size.
    All cost estimates should reflect the full group (if {group_size} is solo), with per-person breakdowns where helpful.
    Account for travel costs (flights, fuel, ferry tickets, etc.), accommodations, food, activities,
    local transportation, and a buffer for unexpected expenses.
    Provide breakdowns across strict, moderate, and comfortable spending tiers where applicable.
  expected_output: >
    A detailed budget report containing:
    - Total estimated cost range for the trip (full group and per person)
    - Day-by-day cost estimate broken down by category (food, transport, activities, etc.)
    - Comparison of strict vs. moderate vs. comfortable spending scenarios
    - Money-saving tips specific to the destination
    - Currency information and recommended payment methods
    Formatted as markdown.
  agent: financial_advisor
  context:
    - resolve_inputs_task


activities_task:
  description: >
    Use the resolved parameters from resolve_inputs_task context as your source of truth.
    Plan a full day-by-day itinerary for the resolved location spanning the resolved time_frame,
    tailored to the resolved group_size and resolved activity_preferences.
    Consider current events, tourist season, climate, local customs, and variety of experiences.
    Include a mix of popular landmarks, hidden gems, restaurants, and cultural experiences.
    Work within the budget constraints provided by budget_task context.
  expected_output: >
    A detailed day-by-day itinerary containing:
    - Morning, afternoon, and evening plans for each day
    - Recommended restaurants and local food experiences
    - Must-see landmarks and off-the-beaten-path spots aligned with resolved activity preferences
    - Estimated time and cost per activity (cross-referenced with budget_task output)
    - Practical tips (best time to visit each spot, reservations needed, etc.)
    Formatted as markdown.
  agent: activities_planner
  context:
    - resolve_inputs_task
    - budget_task


accommodations_task:
  description: >
    Use the resolved parameters from resolve_inputs_task context as your source of truth.
    Find and compare the best accommodations in the resolved location for the resolved time_frame,
    group_size, and budget level.
    Search across hotels, Airbnbs, and hostels. Factor in proximity to planned activities
    (from activities_task context), reviews, amenities, and overall value.
    Present options across multiple budget tiers so the user has choices.
  expected_output: >
    A detailed accommodations report containing:
    - Recommended options per tier (budget, mid-range, comfortable/luxury)
    - For each option: name, type (hotel/Airbnb/hostel/etc.), location, nightly price, key amenities, and a brief review summary
    - Recommended booking platforms and any discount tips
    - Neighborhood notes (safety, proximity to attractions, local vibe)
    Formatted as markdown.
  agent: accommodations_finder
  context:
    - resolve_inputs_task
    - activities_task

photo_curation_task:
  description: >
    Use the resolved parameters from resolve_inputs_task context as your source of truth.
    Use the provided photos API to pull high-quality images of the resolved location.
    Query the API for: landscapes, landmarks, food and cuisine, culture and people, street life, and hidden gems.
    Also pull images relevant to the resolved activity preferences.
    Curate the best results from each category — prioritize variety, quality, and authenticity over quantity.
  expected_output: >
    A visual travel guide containing:
    - A curated gallery organized by category (landscapes, landmarks, food, culture, street life, hidden gems)
    - For each photo: the image URL, location name, and a one-line caption describing what makes it special
    - IS IS IMPORTANT YOU CHECK IF THE IMAGE URL IS ACTUALLY LINKED TO A REAL IMAGE 
    - A short written narrative (3-5 sentences) that captures the visual identity and atmosphere of the destination
    - A "top 5 most photogenic spots" summary for travelers who want the best photo opportunities
    Formatted as markdown with image links rendered inline.
  agent: photographer
  context:
    - resolve_inputs_task

final_package_task:
  description: >
    Compile the outputs from all specialist agents into a single structured vacation reference package.
    Use the resolved parameters from resolve_inputs_task as the authoritative source for all
    field values (location, dates, group size, budget, etc.) — not raw template variables.
    Extract the full detail from each agent's output — this is the complete factual reference that the
    storyteller agent will use next. Include everything: full itinerary, full budget breakdown, all
    accommodation options, all travel options, and all photo embeds. Do not truncate or summarize.
    If any parameters were researched and resolved automatically, include a note listing what was chosen.

    CRITICAL — No hallucinated links: Every URL you include MUST come directly from the tool
    results returned by the other agents. Do NOT invent, guess, or reconstruct any URL from
    memory. If a tool result did not return a working link for something, omit the link entirely
    rather than fabricating one. A missing link is far better than a broken or invented one.

    CRITICAL — Current dates only: All dates must reflect {current_date} as today's date.
    Never write dates from previous years.

    Check if the expected_output you create contains accurate information and that is factual.
    (e.g. are the travel times accurate? are all the links working and factual?)
    If not, then you must revise with factual information.

  expected_output: >
    A comprehensive structured markdown document with the following sections. 
    Every section should have an abundance of options and information to provide.

    # Trip Reference: [Resolved Location]
    Exhuastive overview: origin → destination, travel method, dates, group size, budget level.

    # > **Auto-resolved inputs (if any):** List any fields that were researched and filled in automatically.

    ## 🚗✈️🚢 Getting There
    All travel options from travel_research_task output. Present content appropriate to the method
    of travel (flight options and pricing table for plane; route, drive time, and fuel cost for car;
    operator options and schedules for boat/cruise/ferry). Include booking tips.
    Should be detailed and heavy.

    ## 🏨 Accommodations
    All recommended options organized by tier (budget / mid-range / luxury): name, type, nightly price,
    location, amenities, booking link, and a brief review summary.
    Should be detailed and heavy.

    ## 🗓️ Day-by-Day Itinerary
    Full day-by-day itinerary with morning / afternoon / evening plans, restaurants, landmarks,
    estimated cost per activity, and practical tips. Should be detailed and heavy.

    ## 💰 Budget Breakdown
    Full budget table: Category | Per Person | Total for Group.
    Rows: Travel, Accommodations, Food, Activities, Transport, Buffer, Total.
    Include strict / moderate / comfortable tiers and money-saving tips.
    Should be detailed and heavy.

    ## 📸 Photo Gallery - (DO NOT MISS THIS STEP — THIS SECTION IS REQUIRED.)
    All curated photo embeds from the photographer, organized by category, with captions.
    Copy every image embed EXACTLY as the photographer provided them, in this format: ![caption](url)
    Do NOT convert image embeds into plain text links. Do NOT skip this section even if the
    document is long. This section must appear in the final output. 
    
    There should be an image as a thumbnail/at the top of the website.
    

    Formatted as clean markdown.
  agent: vacation_compiler
  context:
    - resolve_inputs_task
    - travel_research_task
    - budget_task
    - activities_task
    - accommodations_task
    - photo_curation_task
  output_file: output/vacation_package.md
